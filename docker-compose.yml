version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_NAME=student_management_system
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_management_system
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # To initialize the DB, place your .sql dump in the root and uncomment the line below:
      # - ./database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
